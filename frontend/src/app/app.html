<mat-toolbar color="primary" class="app-toolbar">
  <div class="container-fluid d-flex align-items-center">
    <button mat-icon-button [matMenuTriggerFor]="menu" class="me-2">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/tasks" routerLinkActive="active-link">
        <mat-icon>assignment</mat-icon>
        <span>All Tasks</span>
      </button>
      <button mat-menu-item routerLink="/tasks/new" routerLinkActive="active-link">
        <mat-icon>add_task</mat-icon>
        <span>New Task</span>
      </button>
    </mat-menu>

    <a mat-button routerLink="/" class="brand-logo">
      <mat-icon class="me-1">task_alt</mat-icon>
      <span class="fw-bold">TaskManager</span>
    </a>

    <span class="spacer"></span>

    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item disabled>
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item disabled>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item disabled>
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>

<main>
  <router-outlet />
</main>
